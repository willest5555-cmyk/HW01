<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | Will Shen</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="dashboard-container">
        <section class="glass-card welcome-card" id="welcome-section">
            <div class="welcome-text">
                <h1 id="welcome-title">Hello, I'm Will Shen.</h1>
                <p>Hello World. 歡迎來到 Will Shen 的個人化首頁。</p>
            </div>
        </section>

        <div class="dashboard-grid">
            <div class="left-column">
                <section class="glass-card clock-card" id="clock-section">
                    <div class="clock-display">
                        <span id="time-display" class="clock-time">00:00</span>
                        <span id="seconds-display" class="clock-seconds">00</span>
                        <span id="ampm-display" class="clock-ampm">AM</span>
                    </div>
                    <div class="date-display">
                        <i data-lucide="calendar"></i>
                        <span id="date-text">2026 年 6 月 5 日</span>
                        <span class="separator">|</span>
                        <span id="day-of-week-text">星期五</span>
                    </div>
                </section>

                <section class="glass-card weather-card" id="weather-section">
                    <div class="weather-header">
                        <div class="weather-title">
                            <i data-lucide="cloud-sun"></i>
                            <span>即時天氣</span>
                        </div>
                        <div class="search-container">
                            <i data-lucide="search" class="search-icon"></i>
                            <input
                                type="text"
                                id="city-search"
                                class="search-input"
                                placeholder="搜尋城市... (e.g. Taipei)"
                            >
                        </div>
                    </div>
                    <div class="weather-body" id="weather-body-container">
                        <div class="loader-container">
                            <div class="loader"></div>
                            <span>正在載入氣象資料...</span>
                        </div>
                    </div>
                    <div class="weather-details" id="weather-details-container">
                        <div class="weather-detail-item">
                            <i data-lucide="droplets" class="detail-icon humidity-icon"></i>
                            <span class="detail-label">濕度</span>
                            <span class="detail-value" id="humidity-value">--%</span>
                        </div>
                        <div class="weather-detail-item">
                            <i data-lucide="wind" class="detail-icon wind-icon"></i>
                            <span class="detail-label">風速</span>
                            <span class="detail-value" id="wind-value">-- km/h</span>
                        </div>
                        <div class="weather-detail-item">
                            <i data-lucide="umbrella" class="detail-icon rain-icon"></i>
                            <span class="detail-label">降雨機率</span>
                            <span class="detail-value" id="pop-value">--%</span>
                        </div>
                    </div>
                </section>
            </div>

            <section class="glass-card calendar-card" id="calendar-section">
                <div class="calendar-header">
                    <span id="calendar-month-year" class="calendar-title">2026 年 6月</span>
                    <div class="calendar-nav">
                        <button id="prev-month" class="nav-btn" title="上個月" aria-label="上個月">
                            <i data-lucide="chevron-left"></i>
                        </button>
                        <button id="next-month" class="nav-btn" title="下個月" aria-label="下個月">
                            <i data-lucide="chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar-grid-container"></div>
            </section>
        </div>

        <footer class="footer-text">
            <span>Powered by Open-Meteo API - Designed for Will Shen</span>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
